<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Browser Bridge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/>
        </svg>
        <span>MCP Browser Bridge</span>
      </div>
      <div class="version">v1.0.0</div>
    </header>

    <section class="status-card">
      <div class="status-row">
        <span class="status-label">Conexão:</span>
        <span id="connection-status" class="status-badge disconnected">Desconectado</span>
      </div>
      <div class="status-row">
        <span class="status-label">Gravação:</span>
        <span id="recording-status" class="status-badge inactive">Parada</span>
      </div>
    </section>

    <section class="counters">
      <div class="counter">
        <div class="counter-value" id="req-count">0</div>
        <div class="counter-label">Requests</div>
      </div>
      <div class="counter">
        <div class="counter-value" id="dom-count">0</div>
        <div class="counter-label">DOM Events</div>
      </div>
      <div class="counter">
        <div class="counter-value" id="nav-count">0</div>
        <div class="counter-label">Navegações</div>
      </div>
    </section>

    <section class="actions">
      <button id="btn-record" class="btn btn-primary">
        <span class="btn-icon">●</span>
        <span id="btn-record-text">Iniciar Gravação</span>
      </button>
      <button id="btn-export" class="btn btn-secondary">
        <span class="btn-icon">↓</span>
        Exportar HAR
      </button>
      <button id="btn-reset" class="btn btn-ghost">
        <span class="btn-icon">↺</span>
        Resetar
      </button>
    </section>

    <section class="server-info">
      <div class="info-row">
        <span class="info-label">Servidor:</span>
        <span class="info-value">ws://localhost:8765</span>
      </div>
      <a href="http://localhost:8765/status" target="_blank" class="link">Abrir servidor MCP →</a>
    </section>

    <footer>
      <button id="btn-reconnect" class="btn btn-link">Reconectar</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
