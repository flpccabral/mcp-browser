<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Endereço — Cascata AJAX (fixture de dropdowns dependentes)</title>
</head>
<body>
  <h1>Selecionar endereço</h1>
  <p>Selecione país, depois estado, depois cidade. Cada select seguinte só é
     populado após a "requisição AJAX" (simulada com setTimeout) terminar.
     Controle a latência com ?delay=MILLIS (padrão 800).</p>

  <form id="endereco">
    <label for="pais">País</label>
    <select id="pais" aria-label="País">
      <option value="">-- selecione --</option>
      <option value="br">Brasil</option>
      <option value="pt">Portugal</option>
    </select>

    <label for="estado">Estado</label>
    <select id="estado" aria-label="Estado" disabled>
      <option value="">-- aguardando país --</option>
    </select>

    <label for="cidade">Cidade</label>
    <select id="cidade" aria-label="Cidade" disabled>
      <option value="">-- aguardando estado --</option>
    </select>

    <button type="submit" id="confirmar" disabled>Confirmar endereço</button>
  </form>
  <div id="status" role="status">status: ocioso</div>
  <div id="resultado"></div>

  <script>
    var DELAY = parseInt(new URLSearchParams(location.search).get('delay') || '800', 10);
    var DATA = {
      br: { estados: { sp: 'São Paulo', rj: 'Rio de Janeiro' } },
      pt: { estados: { li: 'Lisboa', po: 'Porto' } }
    };
    var CIDADES = {
      sp: ['Campinas', 'Santos'], rj: ['Niterói'], li: ['Sintra', 'Cascais'], po: ['Gaia']
    };
    var status = document.getElementById('status');

    function fakeAjax(fill) {
      status.textContent = 'status: carregando...';
      // Mantém um fetch pendente real para o monitor de rede enxergar atividade.
      fetch('data:text/plain,ok').catch(function () {});
      setTimeout(function () {
        fill();
        status.textContent = 'status: ocioso';
      }, DELAY);
    }

    function setOptions(sel, pairs) {
      sel.innerHTML = '<option value="">-- selecione --</option>';
      pairs.forEach(function (p) {
        var o = document.createElement('option');
        o.value = p[0]; o.textContent = p[1];
        sel.appendChild(o);
      });
      sel.disabled = false;
    }

    document.getElementById('pais').addEventListener('change', function () {
      var pais = this.value;
      var estado = document.getElementById('estado');
      var cidade = document.getElementById('cidade');
      estado.disabled = true; estado.innerHTML = '<option value="">-- carregando --</option>';
      cidade.disabled = true; cidade.innerHTML = '<option value="">-- aguardando estado --</option>';
      document.getElementById('confirmar').disabled = true;
      if (!pais) return;
      fakeAjax(function () {
        var e = DATA[pais].estados;
        setOptions(estado, Object.keys(e).map(function (k) { return [k, e[k]]; }));
      });
    });

    document.getElementById('estado').addEventListener('change', function () {
      var e = this.value;
      var cidade = document.getElementById('cidade');
      cidade.disabled = true; cidade.innerHTML = '<option value="">-- carregando --</option>';
      document.getElementById('confirmar').disabled = true;
      if (!e) return;
      fakeAjax(function () {
        setOptions(cidade, CIDADES[e].map(function (c) { return [c, c]; }));
      });
    });

    document.getElementById('cidade').addEventListener('change', function () {
      document.getElementById('confirmar').disabled = !this.value;
    });

    document.getElementById('endereco').addEventListener('submit', function (e) {
      e.preventDefault();
      var pais = document.getElementById('pais').value;
      var est = document.getElementById('estado').value;
      var cid = document.getElementById('cidade').value;
      if (pais && est && cid) {
        document.getElementById('resultado').textContent =
          'ENDERECO_OK pais=' + pais + ' estado=' + est + ' cidade=' + cid;
        document.title = 'Endereço confirmado';
      } else {
        document.getElementById('resultado').textContent = 'ENDERECO_INCOMPLETO';
      }
    });
  </script>
</body>
</html>
